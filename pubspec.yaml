name: taskflow
description: TaskFlow - Daily Task Manager by Alaa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^16.3.0
  intl: ^0.19.0
  uuid: ^4.3.3
  fl_chart: ^0.66.2
  flutter_slidable: ^3.0.1
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  table_calendar: ^3.1.2
  flutter_staggered_animations: ^1.1.1
  path_provider: ^2.1.2
  sqflite: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
